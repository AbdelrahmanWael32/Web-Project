<!doctype html>
<html>
  <head>
    <title>Sign Up</title>
  </head>
  <body>
    <nav>
      <ul>
        <li>
          <a href="../index.html">
            <img src="../Images/Logo.png" width="2%" />
          </a>
        </li>
        <li><a href="./signUp.html">Sign Up</a></li>
        <li><a href="./login.html">Login</a></li>
      </ul>
    </nav>

    <h1>Sign Up</h1>
    <form method="get">
      <label for="username">Username</label><br />
      <input
        id="username"
        type="text"
        name="username"
        maxlength="40"
        required
      /><br /><br />

      <label for="email">Email</label><br />
      <input id="email" type="email" name="email" required /><br /><br />
      <label for="password">Password</label><br />
      <input
        id="password"
        type="password"
        name="password"
        required
      /><br /><br />
      <label for="confirm_password">Confirm Password</label><br />
      <input
        id="confirm_password"
        type="password"
        name="confirm_password"
        required
      /><br /><br />
      <label for="is_admin">Select you type</label><br />
      <label> <input type="radio" name="is_admin" value="user" /> User </label>
      <label> <input type="radio" name="is_admin" value="admin" /> Admin </label>
      <br /><br />
      <button type="submit" formaction="admin_dashboard.html">
        Sign Up as Admin
      </button>
      <button type="submit" formaction="my_profile.html">
        Sign Up as User
      </button>
    </form>
    <p>You already have an account. <a href="login.html">Login</a></p>
  </body>
</html>
