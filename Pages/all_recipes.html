<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>All Recipes</title>
    <link rel="stylesheet" type="text/css" href="../css/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"
    />
    <script src="./js/navbar.js"></script>
    <!-- MAKE SURE NAVBAR ALWAYS RUNS FIRST -->
  </head>
  <body>
    <h1 class="text-center">All Recipes Page</h1>

    <div class="justify-evenly flexbox flex-wrap all-recipes-container">
      <a href="./recipe1.html">
        <div class="recipe-box flexbox flex-column justify-between">
          <div class="flexbox flex-column">
            <img
              class="align-self-center"
              width="50%"
              src="../Images/dish2.jpg"
            />
          </div>

          <div class="flexbox flex-column recipe-box-bottom">
            <div><h2>Baked Biryani Chicken and Rice</h2></div>
            <div>
              <p>course type: main course</p>
              <p>cooking time: 1 hour</p>
              <p>difficulty: medium</p>
            </div>
            <div class="flexbox flex-column">
              <button
                class="align-self-center"
                type="button"
                onclick="
                  event.preventDefault();
                  event.stopPropagation();
                  addToFavorites();
                "
              >
                Add to Favorites
              </button>
              <!-- Move the onclick stuff to JS -->
            </div>
          </div>
        </div>
      </a>

      <a href="./recipe2.html">
        <div class="recipe-box flexbox flex-column justify-between">
          <div class="flexbox flex-column">
            <img
              class="align-self-center"
              width="50%"
              src="../Images/cream_sandwich.jpg"
            />
          </div>

          <div class="flexbox flex-column recipe-box-bottom">
            <div><h2>Ice Cream Sandwich</h2></div>
            <div>
              <p>course type: dessert</p>
              <p>cooking time: 70 mins</p>
              <p>difficulty: easy</p>
            </div>
            <div class="flexbox flex-column">
              <button
                class="align-self-center"
                type="button"
                onclick="
                  event.preventDefault();
                  event.stopPropagation();
                  addToFavorites();
                "
              >
                Add to Favorites
              </button>
              <!-- Move the onclick stuff to JS -->
            </div>
          </div>
        </div>
      </a>
    </div>

    <script src="../js/allRecipe.js"></script>
    <script src="../js/footer.js"></script>
  </body>
</html>
