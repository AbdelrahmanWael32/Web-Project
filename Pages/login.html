<!doctype html>

<html>
  <head>
    <title>Login</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" type="text/css" href="../css/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"
    />
  </head>
  <body>
    <h1>Login</h1>
    <form>
      <label for="username_or_email">Username/email</label><br />
      <input
        id="username_or_email"
        type="text"
        name="username_or_email"
        required
      /><br /><br />
      <label for="password">Password</label><br />
      <input
        id="password"
        type="password"
        name="password"
        required
      /><br /><br />
      <button type="submit" formaction="admin_dashboard.html">
        Login as Admin
      </button>
      <button type="submit" formaction="my_profile.html">Login as User</button>
    </form>
    <p>Don't have an account? <a href="signUp.html">Sign Up</a></p>

    <script src="./js/navbar.js"></script>
    <!-- MAKE SURE NAVBAR ALWAYS RUNS FIRST -->
    <script src="../js/footer.js"></script>
  </body>
</html>
