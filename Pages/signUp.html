<!doctype html>
<html>
  <head>
    <title>Sign Up</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" type="text/css" href="../css/style.css" />
  </head>
  <body>
    <h1>Sign Up</h1>
    <form method="get">
      <label for="username">Username</label><br />
      <input
        id="username"
        type="text"
        name="username"
        maxlength="40"
        required
      /><br /><br />

      <label for="email">Email</label><br />
      <input id="email" type="email" name="email" required /><br /><br />
      <label for="password">Password</label><br />
      <input
        id="password"
        type="password"
        name="password"
        required
      /><br /><br />
      <label for="confirm_password">Confirm Password</label><br />
      <input
        id="confirm_password"
        type="password"
        name="confirm_password"
        required
      /><br /><br />
      <label for="is_admin">Select you type</label><br />
      <label> <input type="radio" name="is_admin" value="user" /> User </label>
      <label>
        <input type="radio" name="is_admin" value="admin" /> Admin
      </label>
      <br /><br />
      <button type="submit" formaction="admin_dashboard.html">
        Sign Up as Admin
      </button>
      <button type="submit" formaction="my_profile.html">
        Sign Up as User
      </button>
    </form>
    <p>You already have an account. <a href="login.html">Login</a></p>

    <footer>
      <ul>
        <br /><br /><br /><br /><br /><br /><br /><br /><br /><br /><br /><br /><br /><br /><br /><br />

        <li><a href="./ContactUs.html">Contact Us</a></li>
        <li><a href="./AboutUs.html">About Us</a></li>
        <li>Phone Contact: +20 10 63941971</li>
        <li>Email Address: RecipeFinder@gmail.com</li>
      </ul>
    </footer>
    <script src="../js/navbar.js"></script>
  </body>
</html>
