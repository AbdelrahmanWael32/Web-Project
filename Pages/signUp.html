<!doctype html>
<html>
  <head>
    <title>Sign Up</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" type="text/css" href="../css/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"
    />
    <link rel="stylesheet" type="text/css" href="../css/signup.css"/>
  </head>
  <body>

    <div class="signup-container">
      <div class="signup-card">
        <h1>Sign Up</h1>
        <hr class="signup-divider" />
        <form id="signup-form" method="get">

          <div class="form-group">
            <label for="username">Username</label>
            <input
              id="username"
              type="text"
              name="username"
              maxlength="20"
              required
            />
          </div>

          <div class="form-group">
            <label for="email">Email</label>
            <input id="email" 
            type="email" 
            name="email" 
            required />
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <input id="password" 
            type="password" 
            name="password" 
            required />
          </div>

          <div class="form-group">
            <label for="confirm_password">Confirm Password</label>
            <input
              id="confirm_password"
              type="password"
              name="confirm_password"
              required
            />
            <span class="error-msg" id="password-error-dont-match">passwords don't match</span>
            <span class="error-msg" id="password-error-less-than-required">password is less than 6 letters</span>
          </div>
          

          <div class="role-section">

            <p>Select Account Type</p>
            <div class="role-options">
              <label class="role-option" for="role-user">
                <input id="role-user" type="radio" name="is_admin" value="user" />
                User 
              </label>

              <label class="role-option" for="role-admin">
                <input id="role-admin" type="radio" name="is_admin" value="admin" /> 
                Admin
              </label>

            </div>
          </div>


          <button type="submit" class="signup-btn">
            Create account
          </button>

        </form>
        <p class="login-link">Already have an account? <a href="login.html">Login</a></p>

      </div>
    </div>

        <script src="../js/navbar.js"></script>
        <!-- MAKE SURE NAVBAR ALWAYS RUNS FIRST -->
        <script src="../js/footer.js"></script>
        <script src="../js/signup.js"></script>
  </body>
</html>
