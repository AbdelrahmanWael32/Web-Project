<!doctype html>
<html>
  <head>
    <title>Sign Up</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" type="text/css" href="../css/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"
    />
  </head>
  <body>
    <h1>Sign Up</h1>
    <form method="get">
      <label for="username">Username</label>
      <input
        id="username"
        type="text"
        name="username"
        maxlength="40"
        required
      />

      <label for="email">Email</label>
      <input id="email" type="email" name="email" required />
      <label for="password">Password</label>
      <input id="password" type="password" name="password" required />
      <label for="confirm_password">Confirm Password</label>
      <input
        id="confirm_password"
        type="password"
        name="confirm_password"
        required
      />
      <label for="is_admin">Select you type</label>
      <label> <input type="radio" name="is_admin" value="user" /> User </label>
      <label>
        <input type="radio" name="is_admin" value="admin" /> Admin
      </label>
      <button type="submit" formaction="admin_dashboard.html">
        Sign Up as Admin
      </button>
      <button type="submit" formaction="my_profile.html">
        Sign Up as User
      </button>
    </form>
    <p>You already have an account. <a href="login.html">Login</a></p>

    <script src="../js/navbar.js"></script>
    <!-- MAKE SURE NAVBAR ALWAYS RUNS FIRST -->
    <script src="../js/footer.js"></script>
  </body>
</html>
