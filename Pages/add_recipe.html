<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Add Recipe</title>
    <link rel="stylesheet" type="text/css" href="../css/style.css" />
  </head>
  <body>
    <!-- CHANGE THE NAV BAR FOR ADMIN SPECIFIC -->
    <nav>
      <ul>
        <li>
          <a href="./admin_dashboard.html"> Admin Dashboard </a>
        </li>
        <li><a href="add_recipe.html">Recipes</a></li>
        <li><a href="favorites.html">Favorites</a></li>
        <li><a href="my_profile.html">My Profile</a></li>
        <li><a href="../index.html">Logout</a></li>
      </ul>
    </nav>

    <div class="flexbox flex-column align-items-center">
      <form class="flexbox flex-column add-recipe-form justify-evenly">
        <div class="flexbox flex-column gap-small">
          <h3>Add New Recipe</h3>
          <p>Fill in the details to create a new recipe</p>
        </div>

        <div class="flexbox flex-column gap-small">
          <p>Recipe Name:</p>
          <input
            id="recipe_name"
            class="width-100"
            type="text"
            placeholder="e.g., Spaghetti Carbonara"
          />
        </div>

        <div class="flexbox flex-column gap-small">
          <p>Course Type:</p>
          <select id="course_type" class="width-100">
            <option value="" disabled selected hidden>
              Select a Course Type
            </option>
            <option>Appetizers</option>
            <option>Main Course</option>
            <option>Dessert</option>
          </select>
        </div>

        <div class="flexbox flex-column gap-small">
          <p>Difficulty:</p>
          <select id="selected_difficulty" required class="width-100">
            <option value="" disabled selected hidden>
              Select Recipe Difficulty
            </option>
            <option>Easy</option>
            <option>Medium</option>
            <option>Hard</option>
          </select>
          <p hidden class="warning">Recipe name is required</p>
        </div>

        <div class="flexbox flex-column gap-small">
          <p>Recipe Image Link:</p>
          <input
            id="recipe_img"
            class="width-100"
            type="text"
            placeholder="e.g., https://example.com/image.jpg"
          />
        </div>

        <div class="flexbox flex-column gap-small">
          <div class="flexbox justify-between">
            <p>Instructions:</p>
            <button type="button" id="add_instruction">+ Add</button>
          </div>

          <div
            class="flexbox flex-column gap-small"
            id="all_instructions"
          ></div>
        </div>
        <div class="flexbox flex-column gap-small">
          <div class="flexbox justify-between">
            <p>Ingredients:</p>
            <button type="button" id="add_ingredient">+ Add</button>
          </div>
          <div class="flex flex-column gap-small" id="all_ingredients">
            <div class="flex flex-row gap-small">
              <input
                id="ingredient_1"
                class="width-100"
                type="text"
                placeholder="Ingredient 1"
              />
              <button class="delete-btn" type="button">Delete</button>
            </div>
            <div class="flex flex-row gap-small">
              <input
                id="ingredient_1"
                class="width-100"
                type="text"
                placeholder="Ingredient 1"
              />
              <button class="delete-btn" type="button">Delete</button>
            </div>
            <div class="flex flex-row gap-small">
              <input
                id="ingredient_1"
                class="width-100"
                type="text"
                placeholder="Ingredient 1"
              />
              <button class="delete-btn" type="button">Delete</button>
            </div>
          </div>
        </div>

        <button type="button" id="add_recipe">Add Recipe</button>
      </form>
    </div>
    <script src="../js/navbar.js"></script>
    <!-- MAKE SURE NAVBAR ALWAYS RUNS FIRST -->
    <script src="../js/loadRecipes.js"></script>
    <script src="../js/addRecipe.js"></script>
  </body>
</html>
